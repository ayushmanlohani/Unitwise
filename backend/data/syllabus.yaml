          - "Properties of DFT"
          - "Discrete cosine transform"
          - "Image filtering in frequency domain"
        sources:
          - book: "Gonzalez"
            chapters: [4]
            pages: "203-315"
          - book: "Jayaraman"
            chapters: [4]
            pages: "152-242"

      - number: 4
        title: "Image Segmentation"
        topics:
          - "Introduction to image segmentation"
          - "Detection of isolated points"
          - "Line detection"
          - "Edge detection and edge linking"
          - "Region based segmentation - region growing"
          - "Split and merge technique"
          - "Local processing and regional processing"
          - "Hough transform"
          - "Segmentation using threshold"
        sources:
          - book: "Gonzalez"
            chapters: [10]
            pages: "699-809"
          - book: "Jayaraman"
            chapters: [7]
            pages: "368-407"

      - number: 5
        title: "Image Compression"
        topics:
          - "Introduction to image compression"
          - "Coding redundancy"
          - "Inter-pixel redundancy"
          - "Image compression model"
          - "Lossy and lossless compression"
          - "Huffman coding"
          - "Arithmetic coding"
          - "LZW coding"
          - "Transform coding"
          - "Sub-image size selection"
          - "Blocking and DCT implementation using FFT"
          - "Run length coding"
        sources:
          - book: "Gonzalez"
            chapters: [8]
            pages: "539-633"
          - book: "Jayaraman"
            chapters: [9]
            pages: "444-541"


subjects:

  # ============================================================
  # SUBJECT 1: COMPUTER NETWORK
  # ============================================================
  - name: "Computer Network"
    code: "NCS-601"
    folder: "CN"
    books:
      - file: "Tanenbaum_ComputerNetworks.pdf"
        short_name: "Tanenbaum"
      - file: "Forouzan_DataCommunicationNetworking.pdf"
        short_name: "Forouzan"
    units:
      - number: 1
        title: "Introduction Concepts"
        topics:
          - "Goals and applications of networks"
          - "Network structure and architecture"
          - "OSI reference model and services"
          - "Network Topology Design: Delay analysis"
          - "Backbone design and local access network design"
          - "Physical layer transmission media"
          - "Switching methods"
          - "ISDN and terminal handling"
        sources:
          - book: "Tanenbaum"
            chapters: [1, 2]
            pages: "1-186"
          - book: "Forouzan"
            chapters: [1, 2, 3, 4, 5, 6, 7, 8, 9]
            pages: "3-264"

      - number: 2
        title: "Medium Access Sub Layer"
        topics:
          - "Medium access sub layer - channel allocations"
          - "LAN protocols - ALOHA protocols"
          - "Overview of IEEE standards"
          - "FDDI"
          - "Data Link Layer - Elementary data link protocols"
          - "Sliding window protocols"
          - "Error handling"
        sources:
          - book: "Tanenbaum"
            chapters: [3, 4]
            pages: "193-353"
          - book: "Forouzan"
            chapters: [10, 11, 12]
            pages: "267-393"

      - number: 3
        title: "Network Layer"
        topics:
          - "Point to point networks"
          - "Routing algorithms"
          - "Congestion control"
          - "Internet Working - TCP/IP"
          - "IP packet structure"
          - "IP address"
          - "IPv6"
        sources:
          - book: "Tanenbaum"
            chapters: [5]
            pages: "355-488"
          - book: "Forouzan"
            chapters: [19, 20, 21, 22, 24]
            pages: "547-793"

      - number: 4
        title: "Transport Layer"
        topics:
          - "Transport layer design issues"
          - "Connection management"
          - "Session layer design issues"
          - "Remote procedure call"
          - "Presentation layer design issues"
          - "Data compression techniques"
          - "Cryptography"
          - "TCP window management"
        sources:
          - book: "Tanenbaum"
            chapters: [6]
            pages: "495-605"
          - book: "Forouzan"
            chapters: [23]
            pages: "703-759"

      - number: 5
        title: "Application Layer"
        topics:
          - "File transfer, access and management"
          - "Electronic mail"
          - "Virtual terminals"
          - "Other application layer protocols"
          - "Example networks - Internet and public networks"
        sources:
          - book: "Tanenbaum"
            chapters: [7]
            pages: "611-757"
          - book: "Forouzan"
            chapters: [25, 26, 27]
            pages: "797-870"

  # ============================================================
  # SUBJECT 2: DIGITAL IMAGE PROCESSING
  # ============================================================
  - name: "Digital Image Processing"
    code: "NCS-602"
    folder: "DIP"
    books:
      - file: "Gonzalez_Woods_DigitalImageProcessing.pdf"
        short_name: "Gonzalez"
      - file: "Jayaraman_DigitalImageProcessing.pdf"
        short_name: "Jayaraman"
    units:
      - number: 1
        title: "Introduction"
        topics:
          - "Fundamental steps in digital image processing"
          - "Components of an image processing system"
          - "Sampling and quantization"
          - "Representing digital images (data structure)"
          - "Basic relationships between pixels"
          - "Neighbors and connectivity of pixels in image"
          - "Applications of image processing: medical imaging, robot vision, character recognition and remote sensing"
        sources:
          - book: "Gonzalez"
            chapters: [1, 2]
            pages: "17-117"
          - book: "Jayaraman"
            chapters: [1]
            pages: "1-46"

      - number: 2
        title: "Image Enhancement in the Spatial Domain"
        topics:
          - "Basic gray level transformations"
          - "Histogram processing"
          - "Enhancement using arithmetic/logic operations"
          - "Basics of spatial filtering"
          - "Smoothing spatial filters"
          - "Sharpening spatial filters"
          - "Combining spatial enhancement methods"
        sources:
          - book: "Gonzalez"
            chapters: [3]
            pages: "119-201"
          - book: "Jayaraman"
            chapters: [5]
            pages: "243-323"

      - number: 3
